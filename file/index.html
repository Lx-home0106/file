<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>書類ダウンロード</title>

<style>
body {
  margin: 0;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background: #0f172a;
  color: #fff;
}

.container {
  max-width: 600px;
  margin: 50px auto;
  padding: 20px;
}

h1 {
  text-align: center;
  margin-bottom: 30px;
  letter-spacing: 1px;
}

.section {
  margin-bottom: 40px;
}

.section h2 {
  font-size: 18px;
  margin-bottom: 15px;
  border-left: 4px solid #3b82f6;
  padding-left: 10px;
}

.button {
  display: block;
  padding: 16px;
  margin: 10px 0;
  border-radius: 10px;
  text-decoration: none;
  color: #fff;
  text-align: center;
  font-weight: bold;
  background: linear-gradient(135deg, #3b82f6, #06b6d4);
  transition: 0.25s;
}

.button:hover {
  transform: scale(1.05);
  opacity: 0.9;
}

/* 色分け（会社別） */
.blue { background: linear-gradient(135deg, #3b82f6, #06b6d4); }
.green { background: linear-gradient(135deg, #10b981, #22c55e); }
.purple { background: linear-gradient(135deg, #8b5cf6, #a855f7); }

.footer {
  text-align: center;
  margin-top: 40px;
  font-size: 12px;
  opacity: 0.6;
}
</style>
</head>

<body>

<div class="container">

<h1>書類ダウンロード</h1>

<!-- 入居申込 -->
<div class="section">
  <h2>入居申込書</h2>
  <a href="入居申込書（個人）.pdf" target="_blank" class="button blue">個人用</a>
  <a href="入居申込書（法人）.pdf" target="_blank" class="button blue">法人用</a>
</div>

<!-- 日本管理サポート -->
<div class="section">
  <h2>日本管理サポート</h2>
  <a href="日本管理サポート申込書.pdf" target="_blank" class="button green">
    申込書（個人・法人）
  </a>
</div>

<!-- 興和アシスト -->
<div class="section">
  <h2>興和アシスト</h2>
  <a href="興和アシスト申込書.pdf" target="_blank" class="button purple">
    申込書（個人・法人）
  </a>
</div>

<div class="footer">
  © Lx-home
</div>

</div>

</body>
</html>
